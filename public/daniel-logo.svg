<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none" role="img" aria-labelledby="daniel-logo-title">
  <title id="daniel-logo-title">Daniel Chavez brand mark — bold geometric D</title>
  <!-- Chosen: Bold Geometric "D" Mark — architectural, modern, professional -->
  <!-- Dark background -->
  <rect width="200" height="200" rx="28" fill="#1a1a2e"/>

  <!-- Abstract D — geometric construction -->
  <!-- Vertical bar -->
  <rect x="52" y="44" width="18" height="112" rx="4" fill="#f0c040"/>
  <!-- Horizontal top bar -->
  <rect x="52" y="44" width="52" height="16" rx="4" fill="#f0c040"/>
  <!-- Horizontal bottom bar -->
  <rect x="52" y="140" width="52" height="16" rx="4" fill="#f0c040"/>
  <!-- Curved right leg -->
  <path d="M 100 60 Q 142 60 148 100 Q 142 140 100 140" stroke="#f0c040" stroke-width="16" stroke-linecap="round" fill="none"/>

  <!-- Accent geometric shapes — top right corner -->
  <rect x="152" y="44" width="8" height="8" rx="1" fill="#d4a574" opacity="0.8"/>
  <rect x="164" y="44" width="8" height="8" rx="1" fill="#d4a574" opacity="0.5"/>
  <rect x="176" y="44" width="8" height="8" rx="1" fill="#d4a574" opacity="0.3"/>

  <!-- Bottom accent line -->
  <rect x="52" y="164" width="96" height="3" rx="1.5" fill="#d4a574" opacity="0.6"/>
</svg>
